version: "3.8"

services:
  postgres:
    image: postgres:17
    container_name: hotel_bot_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_postgres_pass
      POSTGRES_DB: hotel_bot
    ports:
      - "5433:5432"
    volumes:
      - hotel_db_data:/var/lib/postgresql/data

volumes:
  hotel_db_data: